<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>工程英语单词训练</title>
<style>
  :root {
    --blue:#1f6fff; --blue2:#eaf1ff; --dark:#111827; --muted:#6b7280;
    --line:#e5e7eb; --bg:#f6f8fc; --card:#ffffff; --green:#16a34a; --red:#ef4444;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
    background:linear-gradient(180deg,#dcedff 0%,#f6f8fc 260px); color:var(--dark);
  }
  .app { max-width:480px; margin:0 auto; min-height:100vh; padding:18px 18px 88px; }
  .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .brand { display:flex; gap:10px; align-items:center; }
  .logo { width:42px; height:42px; border-radius:14px; display:grid; place-items:center; background:linear-gradient(135deg,#2563eb,#60a5fa); color:white; font-size:24px; box-shadow:0 8px 24px rgba(37,99,235,.25); }
  .brand h1 { margin:0; font-size:20px; }
  .brand p { margin:2px 0 0; color:var(--muted); font-size:12px; }
  .pill { border:1px solid var(--line); background:white; color:var(--muted); padding:8px 10px; border-radius:999px; font-size:12px; }
  .card { background:var(--card); border-radius:20px; padding:18px; box-shadow:0 8px 30px rgba(15,23,42,.06); margin:14px 0; border:1px solid rgba(229,231,235,.7); }
  .progress-line { height:8px; background:#eef2f7; border-radius:999px; overflow:hidden; margin:10px 0; }
  .progress-line span { display:block; height:100%; width:0%; background:linear-gradient(90deg,#2563eb,#60a5fa); border-radius:999px; transition:.3s; }
  .stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
  .stat { background:#f8fafc; border-radius:16px; padding:14px; }
  .stat b { display:block; font-size:30px; margin-top:6px; }
  .stat small { color:var(--muted); }
  button { border:0; border-radius:16px; padding:14px 16px; font-size:17px; font-weight:700; cursor:pointer; transition:.15s; }
  button:active { transform:scale(.98); }
  .primary { background:var(--blue); color:white; box-shadow:0 8px 18px rgba(31,111,255,.25); }
  .secondary { background:var(--blue2); color:var(--blue); }
  .ghost { background:#f3f4f6; color:#374151; }
  .btn-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
  .screen { display:none; }
  .screen.active { display:block; animation:fade .18s ease-out; }
  @keyframes fade { from {opacity:.3; transform:translateY(6px)} to {opacity:1; transform:none} }
  .hero { background:linear-gradient(135deg,#111827,#374151); color:white; min-height:210px; display:flex; align-items:center; justify-content:center; text-align:center; border-radius:22px; overflow:hidden; position:relative; }
  .hero:before { content:""; position:absolute; inset:-80px; background:radial-gradient(circle at 25% 30%, rgba(96,165,250,.55), transparent 35%), radial-gradient(circle at 75% 55%, rgba(249,115,22,.35), transparent 30%); }
  .hero .emoji { position:relative; font-size:76px; filter:drop-shadow(0 12px 18px rgba(0,0,0,.25)); }
  .tag { display:inline-block; background:#eef2ff; color:#4453a5; border-radius:999px; padding:6px 10px; font-size:13px; font-weight:700; margin-bottom:10px; }
  .word { text-align:center; margin:20px 0 10px; }
  .word h2 { margin:0; font-size:38px; letter-spacing:.3px; word-break:break-word; }
  .phonetic { color:#9ca3af; margin-top:6px; font-size:15px; }
  .sentence { font-size:22px; line-height:1.5; margin:8px 0 4px; }
  .sentence b { color:var(--blue); }
  .options { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
  .option { background:white; border:2px solid #eef2f7; border-radius:16px; padding:20px 12px; min-height:92px; font-size:18px; text-align:left; font-weight:700; }
  .option.correct { border-color:#86efac; background:#f0fdf4; color:#166534; }
  .option.wrong { border-color:#fecaca; background:#fef2f2; color:#991b1b; }
  .answer { border-left:5px solid var(--green); background:#f0fdf4; }
  .muted { color:var(--muted); }
  .spell-box { text-align:center; }
  .spell-cn { font-size:22px; font-weight:800; margin:12px 0; }
  .spell-input { width:100%; border:2px solid #dbeafe; border-radius:18px; padding:16px; font-size:28px; text-align:center; letter-spacing:2px; outline:none; text-transform:lowercase; }
  .spell-input:focus { border-color:var(--blue); box-shadow:0 0 0 4px rgba(31,111,255,.10); }
  .letters { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:14px 0; }
  .letter { width:38px; height:38px; border-radius:12px; display:grid; place-items:center; background:#eef2ff; color:#1d4ed8; font-weight:800; }
  .notice { padding:12px; border-radius:14px; margin-top:12px; display:none; }
  .notice.ok { display:block; background:#f0fdf4; color:#166534; }
  .notice.no { display:block; background:#fef2f2; color:#991b1b; }
  .bottom { position:fixed; left:0; right:0; bottom:0; background:rgba(255,255,255,.92); backdrop-filter:blur(12px); border-top:1px solid var(--line); }
  .bottom-inner { max-width:480px; margin:0 auto; display:grid; grid-template-columns:repeat(4,1fr); padding:8px 12px 12px; gap:8px; }
  .tab { text-align:center; color:#6b7280; padding:8px 0; font-size:12px; border-radius:12px; }
  .tab.active { color:var(--blue); background:var(--blue2); font-weight:800; }
  .tab div { font-size:20px; margin-bottom:2px; }
  .list { display:grid; gap:10px; }
  .item { display:flex; justify-content:space-between; align-items:center; background:white; border:1px solid var(--line); border-radius:16px; padding:12px; gap:12px; }
  .item b { font-size:17px; }
  .item span { color:var(--muted); font-size:13px; }
  .select { width:100%; border:1px solid var(--line); border-radius:14px; padding:12px; background:white; font-size:16px; margin-top:6px; }
  .small { font-size:13px; }
  .voice-btn { display:inline-flex; align-items:center; gap:6px; border:1px solid #dbeafe; background:#eff6ff; color:#1d4ed8; padding:8px 12px; border-radius:999px; font-size:14px; font-weight:800; box-shadow:none; }
  .book-grid { display:grid; gap:10px; margin-top:12px; }
  .book-card { border:1px solid var(--line); border-radius:16px; padding:14px; background:#fafafa; }
  .book-card b { display:block; font-size:17px; margin-bottom:4px; }
  @media (max-width:360px) { .options { grid-template-columns:1fr; } .word h2 { font-size:32px; } .sentence { font-size:20px; } }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="logo">A</div>
      <div><h1>工程英语单词训练</h1><p>词库 → 选义 → 答案 → 拼写</p></div>
    </div>
    <div class="pill" id="countPill">0 / 0</div>
  </div>

  <section id="home" class="screen active">
    <div class="card">
      <div class="tag">今日计划</div>
      <h2 style="margin:0 0 6px;">按日期词库分批学习</h2>
      <p class="muted" style="margin:0;">旧词库和新词库分开保存进度，扩充词库不会打乱原来的学习记录。</p>
      <div class="progress-line"><span id="homeProgress"></span></div>
      <div class="stats">
        <div class="stat"><small>当前词库已学</small><b id="learnedNum">0</b></div>
        <div class="stat"><small>当前词库正确率</small><b id="accNum">0%</b></div>
      </div>
      <div class="btn-row">
        <button class="secondary" onclick="resetCurrentProgress()">重置当前词库</button>
        <button class="primary" onclick="startLearning()">开始学习</button>
      </div>
    </div>

    <div class="card">
      <label class="small muted">选择词库批次</label>
      <select id="bookSelect" class="select" onchange="changeBook()"></select>
      <br><br>
      <label class="small muted">选择章节</label>
      <select id="catSelect" class="select" onchange="changeCategory()"></select>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">词库概览</h3>
      <div class="book-grid" id="bookOverview"></div>
    </div>
  </section>

  <section id="choice" class="screen">
    <div class="card">
      <div class="tag" id="catTag">章节</div>
      <div class="hero"><div class="emoji" id="heroEmoji">🏗️</div></div>
      <div class="word"><h2 id="wordTitle">word</h2><div class="phonetic" id="wordBook">工程现场高频词</div></div>
      <div class="sentence" id="sentence"></div>
      <button class="voice-btn" onclick="speakSentence()" style="margin-top:10px;">🔊 朗读句子</button>
    </div>
    <div class="options" id="options"></div>
  </section>

  <section id="answer" class="screen">
    <div class="card answer">
      <h3>✅ 正确答案</h3>
      <div class="word" style="text-align:left;margin:0;"><h2 id="ansWord" style="font-size:32px;"></h2><p><b id="ansCn"></b></p></div>
      <p><b>常用搭配：</b><span id="ansCol"></span></p>
      <p><b>例句：</b><span id="ansSent"></span></p>
      <p class="muted" id="ansZh"></p>
    </div>
    <button class="primary" style="width:100%;" onclick="goSpell()">进入拼写</button>
  </section>

  <section id="spell" class="screen">
    <div class="card spell-box">
      <div class="hero"><div class="emoji">✍️</div></div>
      <div class="spell-cn" id="spellCn">中文意思</div>
      <button class="voice-btn" onclick="speakWord()" style="margin-bottom:10px;">🔊 朗读单词</button>
      <p class="muted">请拼写这个英文单词或短语</p>
      <input id="spellInput" class="spell-input" autocomplete="off" autocapitalize="off" />
      <div class="letters" id="letters"></div>
      <div id="spellNotice" class="notice"></div>
      <div class="btn-row"><button class="ghost" onclick="showHint()">提示</button><button class="primary" onclick="checkSpell()">提交</button></div>
    </div>
  </section>

  <section id="book" class="screen">
    <div class="card">
      <h2 style="margin-top:0;">单词本</h2>
      <p class="muted" id="bookDesc">当前词库和章节的全部词汇。</p>
      <div class="list" id="wordList"></div>
    </div>
  </section>
</div>

<div class="bottom">
  <div class="bottom-inner">
    <div class="tab active" onclick="showScreen('home')"><div>🏠</div>首页</div>
    <div class="tab" onclick="startLearning()"><div>📖</div>学习</div>
    <div class="tab" onclick="goSpell()"><div>✍️</div>拼写</div>
    <div class="tab" onclick="showBook()"><div>📚</div>单词本</div>
  </div>
</div>

let selectedBook = localStorage.getItem("eng_selected_book") || "2026年5月10日词库";
let selectedCat = localStorage.getItem("eng_selected_cat") || "全部";
let pool = [];
let currentIndex = Number(localStorage.getItem(progressKey()) || localStorage.getItem("eng_index") || 0);
let current = null;

function progressKey() { return "eng_index__" + selectedBook + "__" + selectedCat; }
function statsKey() { return "eng_stats__" + selectedBook; }
function getStats() { return JSON.parse(localStorage.getItem(statsKey()) || '{"done":0,"right":0,"choice":0,"spellRight":0}'); }
function setStats(s) { localStorage.setItem(statsKey(), JSON.stringify(s)); }

function save() {
  localStorage.setItem(progressKey(), currentIndex);
  localStorage.setItem("eng_selected_book", selectedBook);
  localStorage.setItem("eng_selected_cat", selectedCat);
  if (selectedBook === "2026年5月10日词库" && selectedCat === "全部") {
    localStorage.setItem("eng_index", currentIndex);
  }
}

function setPool() {
  pool = WORDS.filter(x => x.book === selectedBook);
  if (selectedCat !== "全部") pool = pool.filter(x => x.cat === selectedCat);
  if (currentIndex >= pool.length) currentIndex = 0;
  current = pool[currentIndex] || WORDS[0];
}

function init() {
  // 迁移旧版：如果旧版 eng_stats 存在，则放入 2026年5月10日词库统计，不覆盖已有新统计
  const oldStats = localStorage.getItem("eng_stats");
  if (oldStats && !localStorage.getItem("eng_stats__2026年5月10日词库")) {
    localStorage.setItem("eng_stats__2026年5月10日词库", oldStats);
  }
  const oldIndex = localStorage.getItem("eng_index");
  if (oldIndex && !localStorage.getItem("eng_index__2026年5月10日词库__全部")) {
    localStorage.setItem("eng_index__2026年5月10日词库__全部", oldIndex);
  }

  const books = [...new Set(WORDS.map(x=>x.book))];
  const bookSel = document.getElementById("bookSelect");
  bookSel.innerHTML = books.map(b=>`<option value="${b}">${b}</option>`).join("");
  if (!books.includes(selectedBook)) selectedBook = books[0];
  bookSel.value = selectedBook;
  fillCategories();
  setPool();
  updateHome();
  renderBook();
}

function fillCategories() {
  const cats = ["全部", ...new Set(WORDS.filter(x=>x.book===selectedBook).map(x=>x.cat))];
  const sel = document.getElementById("catSelect");
  sel.innerHTML = cats.map(c=>`<option value="${c}">${c}</option>`).join("");
  if (!cats.includes(selectedCat)) selectedCat = "全部";
  sel.value = selectedCat;
  currentIndex = Number(localStorage.getItem(progressKey()) || 0);
}

function updateTabs(id) {
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  const names = ["home","choice","spell","book"];
  const idx = names.indexOf(id);
  if(idx>=0) document.querySelectorAll(".tab")[idx].classList.add("active");
}
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  updateTabs(id);
  updateHome();
}

function updateHome() {
  setPool();
  const stats = getStats();
  document.getElementById("countPill").textContent = `${pool.length ? Math.min(currentIndex+1,pool.length) : 0} / ${pool.length}`;
  document.getElementById("learnedNum").textContent = stats.done;
  const acc = stats.choice ? Math.round(stats.right / stats.choice * 100) : 0;
  document.getElementById("accNum").textContent = acc + "%";
  const p = pool.length ? Math.round((currentIndex / pool.length) * 100) : 0;
  document.getElementById("homeProgress").style.width = p + "%";

  const books = [...new Set(WORDS.map(x=>x.book))];
  document.getElementById("bookOverview").innerHTML = books.map(b => {
    const total = WORDS.filter(x=>x.book===b).length;
    const s = JSON.parse(localStorage.getItem("eng_stats__" + b) || '{"done":0,"right":0,"choice":0}');
    const a = s.choice ? Math.round(s.right / s.choice * 100) : 0;
    return `<div class="book-card"><b>${b}</b><span class="muted">总数 ${total}｜已学 ${s.done||0}｜正确率 ${a}%</span></div>`;
  }).join("");
}

function changeBook() {
  localStorage.setItem(progressKey(), currentIndex);
  selectedBook = document.getElementById("bookSelect").value;
  selectedCat = "全部";
  fillCategories();
  setPool();
  save();
  updateHome();
  renderBook();
}

function changeCategory() {
  localStorage.setItem(progressKey(), currentIndex);
  selectedCat = document.getElementById("catSelect").value;
  currentIndex = Number(localStorage.getItem(progressKey()) || 0);
  setPool();
  save();
  updateHome();
  renderBook();
}

const emojis = ["🏗️","🦺","📐","🚧","🏢","🔧","📝","🚚","⚠️","✅"];
function startLearning() {
  setPool();
  current = pool[currentIndex];
  document.getElementById("catTag").textContent = current.cat;
  document.getElementById("heroEmoji").textContent = emojis[currentIndex % emojis.length];
  document.getElementById("wordTitle").textContent = current.w;
  document.getElementById("wordBook").textContent = current.book;
  const escaped = current.w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  document.getElementById("sentence").innerHTML = current.sent.replace(new RegExp(escaped, "i"), m => `<b>${m}</b>`);
  const box = document.getElementById("options");
  box.innerHTML = "";
  current.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt;
    btn.onclick = () => choose(opt, btn);
    box.appendChild(btn);
  });
  showScreen("choice");
}

function choose(opt, btn) {
  const stats = getStats();
  const correct = opt === current.cn;
  stats.choice++;
  if(correct) stats.right++;
  document.querySelectorAll(".option").forEach(b => {
    b.disabled = true;
    if(b.textContent === current.cn) b.classList.add("correct");
    else if(b === btn) b.classList.add("wrong");
  });
  setStats(stats);
  save();
  setTimeout(showAnswer, 650);
}

function showAnswer() {
  document.getElementById("ansWord").textContent = current.w;
  document.getElementById("ansCn").textContent = current.cn;
  document.getElementById("ansCol").textContent = current.col;
  document.getElementById("ansSent").textContent = current.sent;
  document.getElementById("ansZh").textContent = current.zh;
  showScreen("answer");
}

function goSpell() {
  setPool();
  current = current || pool[currentIndex] || WORDS[0];
  document.getElementById("spellCn").textContent = current.cn;
  const input = document.getElementById("spellInput");
  input.value = "";
  document.getElementById("spellNotice").className = "notice";
  document.getElementById("spellNotice").textContent = "";
  renderLetters(false);
  showScreen("spell");
  setTimeout(()=>input.focus(), 150);
}

function renderLetters(hint) {
  const letters = document.getElementById("letters");
  const display = current.w.split("").map((ch,i) => {
    if(ch === " ") return "&nbsp;";
    if(ch === "/" || ch === "-") return ch;
    if(hint && (i===0 || i===current.w.length-1)) return ch;
    return "•";
  });
  letters.innerHTML = display.map(ch => `<span class="letter">${ch}</span>`).join("");
}

function showHint() {
  renderLetters(true);
  document.getElementById("spellInput").value = current.w[0];
  document.getElementById("spellInput").focus();
}

function normalize(s) { return s.trim().toLowerCase().replace(/\s+/g," "); }
function checkSpell() {
  const val = document.getElementById("spellInput").value;
  const notice = document.getElementById("spellNotice");
  if(normalize(val) === normalize(current.w)) {
    const stats = getStats();
    stats.spellRight++;
    stats.done++;
    setStats(stats);
    currentIndex = (currentIndex + 1) % pool.length;
    notice.className = "notice ok";
    notice.innerHTML = `正确！<b>${current.w}</b> = ${current.cn}`;
    save();
    setTimeout(startLearning, 900);
  } else {
    notice.className = "notice no";
    notice.innerHTML = `还不对。正确拼写是：<b>${current.w}</b>`;
  }
}

function resetCurrentProgress() {
  if(!confirm("确定重置当前词库/章节进度吗？")) return;
  currentIndex = 0;
  localStorage.removeItem(progressKey());
  localStorage.removeItem(statsKey());
  save();
  updateHome();
}

function renderBook() {
  setPool();
  document.getElementById("bookDesc").textContent = `${selectedBook}｜${selectedCat}｜共 ${pool.length} 个词`;
  const list = document.getElementById("wordList");
  list.innerHTML = pool.map(x => `<div class="item"><div><b>${x.w}</b><br><span>${x.col}</span></div><strong>${x.cn}</strong></div>`).join("");
}
function showBook() { renderBook(); showScreen("book"); }

function speakText(text, rate=0.86) {
  if (!("speechSynthesis" in window)) {
    alert("当前浏览器不支持语音朗读，请使用 Chrome、Edge 或 Safari。");
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-US";
  utter.rate = rate;
  utter.pitch = 1;
  utter.volume = 1;
  const voices = window.speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang && v.lang.toLowerCase() === "en-us") || voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en"));
  if (enVoice) utter.voice = enVoice;
  if (!voices.length) {
    setTimeout(() => {
      const retryVoices = window.speechSynthesis.getVoices();
      const retryVoice = retryVoices.find(v => v.lang && v.lang.toLowerCase() === "en-us") || retryVoices.find(v => v.lang && v.lang.toLowerCase().startsWith("en"));
      if (retryVoice) utter.voice = retryVoice;
      window.speechSynthesis.speak(utter);
    }, 120);
    return;
  }
  window.speechSynthesis.speak(utter);
}
function speakSentence() { if (!current) setPool(); speakText(current.sent, 0.82); }
function speakWord() { if (!current) setPool(); speakText(current.w, 0.78); }
if ("speechSynthesis" in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

init();
</script>
